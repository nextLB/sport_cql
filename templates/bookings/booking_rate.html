{% extends 'base.html' %}

{% block title %}评价预约 - 体育场所预订系统{% endblock %}

{% block content %}
<div class="row justify-content-center">
    <div class="col-md-6">
        <div class="card">
            <div class="card-header">
                <h4 class="mb-0"><i class="bi bi-star"></i> 评价预约</h4>
            </div>
            <div class="card-body">
                <div class="border rounded p-3 mb-3">
                    <p><strong>场地：</strong>{{ booking.space.venue.name }} - {{ booking.space.name }}</p>
                    <p><strong>日期：</strong>{{ booking.booking_date }}</p>
                    <p><strong>时间：</strong>{{ booking.time_slot }}</p>
                </div>
                <form method="post">
                    {% csrf_token %}
                    <div class="mb-3">
                        <label class="form-label">{{ form.score.label }}</label>
                        {{ form.score }}
                    </div>
                    <div class="mb-3">
                        <label class="form-label">{{ form.comment.label }}</label>
                        {{ form.comment }}
                    </div>
                    <button type="submit" class="btn btn-primary">提交评价</button>
                    <a href="{% url 'bookings:my_bookings' %}" class="btn btn-secondary">返回</a>
                </form>
            </div>
        </div>
    </div>
</div>
{% endblock %}
