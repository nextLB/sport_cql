{% extends 'base.html' %}

{% block title %}确认删除课程 - 体育场所预订系统{% endblock %}

{% block content %}
<div class="row">
    <div class="col-md-6 mx-auto">
        <div class="card">
            <div class="card-header bg-danger text-white">
                <h4><i class="bi bi-exclamation-triangle"></i> 确认删除</h4>
            </div>
            <div class="card-body">
                <p>确定要删除课程 <strong>{{ course.course_name }}</strong> 吗？</p>
                <p class="text-muted">此操作将删除课程及其所有报名记录，无法恢复。</p>
                <form method="post">
                    {% csrf_token %}
                    <div class="text-center">
                        <button type="submit" class="btn btn-danger">确认删除</button>
                        <a href="{% url 'courses:my_courses' %}" class="btn btn-secondary">取消</a>
                    </div>
                </form>
            </div>
        </div>
    </div>
</div>
{% endblock %}
