{% extends 'base.html' %}

{% block title %}审批报名 - 体育场所预订系统{% endblock %}

{% block content %}
<div class="row">
    <div class="col-md-6 mx-auto">
        <div class="card">
            <div class="card-header">
                <h4><i class="bi bi-check-circle"></i> 审批报名</h4>
            </div>
            <div class="card-body">
                <dl class="row">
                    <dt class="col-sm-4">课程</dt>
                    <dd class="col-sm-8">{{ enrollment.course.course_name }}</dd>
                    <dt class="col-sm-4">学员</dt>
                    <dd class="col-sm-8">{{ enrollment.user.username }}</dd>
                    <dt class="col-sm-4">报名时间</dt>
                    <dd class="col-sm-8">{{ enrollment.created_at }}</dd>
                </dl>
                <form method="post">
                    {% csrf_token %}
                    <div class="mb-3">
                        <label class="form-label">选择操作</label>
                        <div class="btn-group w-100" role="group">
                            <button type="submit" name="status" value="confirmed" class="btn btn-success">确认</button>
                            <button type="submit" name="status" value="cancelled" class="btn btn-danger">拒绝</button>
                        </div>
                    </div>
                </form>
                <div class="text-center mt-3">
                    <a href="{% url 'courses:enrollment_manage' %}">返回列表</a>
                </div>
            </div>
        </div>
    </div>
</div>
{% endblock %}
