{% extends 'base.html' %}

{% block title %}个人信息 - 体育场所预订系统{% endblock %}

{% block content %}
<div class="row">
    <div class="col-md-3">
        <div class="card">
            <div class="card-body text-center">
                {% if user.avatar %}
                <img src="{{ user.avatar.url }}" class="rounded-circle mb-3" width="100" height="100">
                {% else %}
                <i class="bi bi-person-circle fs-1 text-secondary"></i>
                {% endif %}
                <h5>{{ user.username }}</h5>
                <p class="text-muted">
                    <span class="badge bg-{{ user.role|default:'primary' }}">
                        {{ user.get_role_display }}
                    </span>
                </p>
            </div>
        </div>
    </div>
    <div class="col-md-9">
        <div class="card">
            <div class="card-header">
                <h4 class="mb-0"><i class="bi bi-person-gear"></i> 个人信息</h4>
            </div>
            <div class="card-body">
                <form method="post" enctype="multipart/form-data">
                    {% csrf_token %}
                    <div class="mb-3">
                        <label class="form-label">{{ form.email.label }}</label>
                        {{ form.email }}
                    </div>
                    <div class="mb-3">
                        <label class="form-label">{{ form.phone.label }}</label>
                        {{ form.phone }}
                    </div>
                    <div class="mb-3">
                        <label class="form-label">{{ form.avatar.label }}</label>
                        {{ form.avatar }}
                    </div>
                    <div class="mb-3">
                        <label class="form-label">账户状态</label>
                        <input type="text" class="form-control" value="{{ user.get_status_display }}" disabled>
                    </div>
                    <div class="mb-3">
                        <label class="form-label">注册时间</label>
                        <input type="text" class="form-control" value="{{ user.created_at }}" disabled>
                    </div>
                    <button type="submit" class="btn btn-primary">保存修改</button>
                </form>
            </div>
        </div>
    </div>
</div>
{% endblock %}
