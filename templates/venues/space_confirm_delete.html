{% extends 'base.html' %}

{% block title %}确认删除 - 体育场所预订系统{% endblock %}

{% block content %}
<div class="row justify-content-center">
    <div class="col-md-6">
        <div class="card">
            <div class="card-header bg-danger text-white">
                <h4 class="mb-0"><i class="bi bi-exclamation-triangle"></i> 确认删除</h4>
            </div>
            <div class="card-body">
                <p>确定要删除场地 <strong>{{ space.name }}</strong> 吗？</p>
                <p class="text-muted">此操作将同时删除该场地下所有关联的预约记录。</p>
                <form method="post">
                    {% csrf_token %}
                    <button type="submit" class="btn btn-danger">确认删除</button>
                    <a href="{% url 'venues:space_list' %}" class="btn btn-secondary">取消</a>
                </form>
            </div>
        </div>
    </div>
</div>
{% endblock %}
